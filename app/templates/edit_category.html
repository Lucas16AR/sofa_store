{% extends "base.html" %}

{% block title %}Editar categoría | Admin{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card form-card p-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2 class="fw-bold mb-0">Editar categoría</h2>
                <a href="{{ url_for('admin.manage_categories') }}" class="btn btn-outline-dark">Volver</a>
            </div>

            <form method="POST">
                {{ form.hidden_tag() }}

                <div class="mb-3">
                    {{ form.name.label(class="form-label") }}
                    {{ form.name(class="form-control") }}
                </div>

                {{ form.submit(class="btn btn-dark w-100") }}
            </form>
        </div>
    </div>
</div>
{% endblock %}
